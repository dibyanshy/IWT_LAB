<html>
<head>
<title>if else</title>
<script>
let marks = 85;
let grade;
if (marks >= 90) {
    grade = 'A';
} else if (marks >= 75) {
    grade = 'B';
} else if (marks >= 50) {
    grade = 'C';
} else {
    grade = 'Fail';
}
document.write(`Marks: ${marks}, Grade: ${grade}`);
</script>
</head>
<body bgcolor="yellow" text="red">
</body>
</html>
