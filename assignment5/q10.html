
<html>
<head>
<title>Even and Odd Arrays</title>
</head>
<body>
<script>
function splitEvenOdd(arr) {
  var even = [];
  var odd = [];

  for (var i = 0; i < arr.length; i++) {
    if (arr[i] % 2 === 0) {
      even.push(arr[i]);   
    } else {
      odd.push(arr[i]);   
    }
  }

  return { even: even, odd: odd };
}
var numbers=[1,2,3,4,5,6]
var result = splitEvenOdd(numbers);
document.write("Original Array: " + numbers + "<br>");
document.write("Even Numbers: " + result.even + "<br>");
document.write("Odd Numbers: " + result.odd);
</script>
</body>
</html>
