<!DOCTYPE html>
<html>
<head>
<title>Reverse Array</title>
</head>
<body>
<script>
function reverseArray(arr) {
  var reversed = [];
 
  for (var i = arr.length - 1; i >= 0; i--) {
    reversed.push(arr[i]);
  }
  return reversed;
}


var numbers = [1, 2, 3, 4, 5];
var result = reverseArray(numbers);

document.write("Original Array: " + numbers + "<br>");
document.write("Reversed Array: " + result);
</script>
</body>
</html>
